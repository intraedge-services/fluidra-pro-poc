version: 2

models:
  - name: dim_date
    description: "Date dimension 2020-2030"
    columns:
      - name: date_key
        tests: [unique, not_null]
  - name: dim_dealer
    description: "Dealer dimension with latest state"
    columns:
      - name: dealer_key
        tests: [unique, not_null]
      - name: dealer_id
        tests: [unique, not_null]
      - name: dealer_status
        tests:
          - accepted_values:
              values: ['ACTIVE', 'LEAD']
  - name: dim_user
    description: "User/contact dimension"
    columns:
      - name: user_key
        tests: [unique, not_null]
      - name: user_id
        tests: [unique, not_null]
      - name: role
        tests: [not_null]
