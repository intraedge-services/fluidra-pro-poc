version: 2

models:
  - name: stg_fluidrapro_contacts
    description: "Staged contact events, deduplicated by pro_contact_id"
    columns:
      - name: pro_contact_id
        tests: [unique, not_null]
      - name: contact_type
        tests:
          - accepted_values:
              values: ['OWNER','CO-OWNER','TECHNICIAN','CSC','OFFICE ADMIN','OTHER']
      - name: login_status
        tests:
          - accepted_values:
              values: ['ACTIVE','PENDING']
  - name: stg_fluidrapro_businesses
    description: "Staged business events, deduplicated by pro_business_id"
    columns:
      - name: pro_business_id
        tests: [unique, not_null]
      - name: business_status
        tests:
          - accepted_values:
              values: ['ACTIVE','LEAD']
