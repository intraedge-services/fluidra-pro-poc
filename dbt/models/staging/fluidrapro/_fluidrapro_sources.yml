version: 2

sources:
  - name: fluidrapro_raw
    description: "Fluidra Pro Platform CDC events ingested via Kafka/Snowpipe"
    database: "{{ env_var('DBT_RAW_DATABASE', 'RAW_DB_PROD') }}"
    schema: FLUIDRAPRO_RAW
    tables:
      - name: raw_dealers_data
        description: "Raw CDC events from Kafka topic psot_poolpro_inbound"
        columns:
          - name: RECORD_METADATA
            description: "Kafka metadata (topic, partition, offset, key, CreateTime)"
          - name: RECORD_CONTENT
            description: "Full event payload JSON from Fluidra Pro Platform"
          - name: EVENT_TIME
            description: "Event timestamp"
      - name: fpro_qa
        description: "Fluidra Pro QA environment CDC events (full scenario coverage)"
        columns:
          - name: RECORD_METADATA
            description: "Kafka metadata JSON (topic, partition, offset, key, CreateTime)"
          - name: RECORD_CONTENT
            description: "Full event payload JSON from Fluidra Pro Platform"
